name: Post to Facebook Every 3 Hours

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Post message to Facebook
        uses: roncodes/post-to-facebook-page@v1.0.0
        with:
          page-id: ${{ secrets.FACEBOOK_PAGE_ID }}
          access-token: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          message: "Hello from GitHub! This is my automated post. 🚀"
